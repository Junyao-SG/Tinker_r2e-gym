# Overrides for vLLM self-hosted inference mode
proxy:
  enabled: true
  backend: "vllm"
  model:
    name: "Qwen/Qwen3-30B-A3B"

vllm:
  image: "vllm/vllm-openai:v0.8.5"
  args:
    tensorParallelSize: 4
    maxModelLen: 32768
    toolCallParser: "hermes"
    trustRemoteCode: true
    extraArgs: []
