# Overrides for GRPO training mode
job:
  type: "training"

proxy:
  enabled: true
  backend: "tinker"
  model:
    name: "Qwen/Qwen3-30B-A3B"
    weightsPath: ""

training:
  grpo:
    learningRate: 2.0e-5
    groupSize: 10
    numSteps: 1000
    checkpointEvery: 50

r2egym:
  workers: 20
  maxSteps: 40
  temperature: 1.0
