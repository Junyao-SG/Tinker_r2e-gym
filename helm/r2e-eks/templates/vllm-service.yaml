{{- if and .Values.proxy.enabled (eq .Values.proxy.backend "vllm") }}
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "r2e-eks.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "r2e-eks.vllm.selectorLabels" . | nindent 4 }}
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
{{- end }}
