{{- if and .Values.proxy.enabled (ne .Values.proxy.backend "vllm") }}
apiVersion: v1
kind: Service
metadata:
  name: tinker-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "r2e-eks.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "r2e-eks.proxy.selectorLabels" . | nindent 4 }}
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
{{- end }}
